<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF9933" />
      <stop offset="50%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#138808" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="1200" height="400" fill="url(#bg)" rx="20"/>
  <text x="600" y="200" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="#000080" text-anchor="middle" alignment-baseline="middle" filter="url(#shadow)">Swachh Bharat Monitor</text>
  <text x="600" y="280" font-family="Arial, sans-serif" font-size="32" font-weight="normal" fill="#333333" text-anchor="middle" alignment-baseline="middle">Crowd-sourced Cleanliness Tracking for India</text>
</svg>
